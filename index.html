<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lichess Satranç Kulübü</title>
    <style>
        body { 
            background-color: #1a1a1a; 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin-top: 3%; 
            padding-bottom: 50px;
        }
        
        #giris-butonu { 
            padding: 20px 40px; 
            font-size: 24px; 
            background-color: #2c2c2c; 
            color: #ffcc00; 
            border: 2px solid #ffcc00; 
            border-radius: 10px; 
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15%;
        }
        #giris-butonu:hover { 
            background-color: #ffcc00; 
            color: #1a1a1a; 
            box-shadow: 0 0 15px #ffcc00;
        }
        
        #icerik { display: none; margin-top: 20px; }
        
        .tablo-kapsayici {
            background-color: #2c2c2c;
            border-radius: 10px;
            padding: 20px;
            margin: 20px auto;
            width: 90%;
            max-width: 650px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.6);
        }
        
        .scroll-kapsayici {
            max-height: 400px; 
            overflow-y: auto;  
            padding-right: 10px;
        }
        
        .scroll-kapsayici::-webkit-scrollbar { width: 8px; }
        .scroll-kapsayici::-webkit-scrollbar-track { background: #1a1a1a; border-radius: 4px; }
        .scroll-kapsayici::-webkit-scrollbar-thumb { background: #ffcc00; border-radius: 4px; }
        
        .oyuncu-satiri {
            display: flex;
            justify-content: space-between;
            padding: 12px 5px;
            border-bottom: 1px solid #444;
            font-size: 18px;
        }
        .oyuncu-satiri:last-child { border-bottom: none; }
        
        .unvan-1 { color: #ffd700; font-weight: bold; animation: parilti 1.5s infinite alternate; font-size: 20px; }
        .unvan-2 { color: #c0c0c0; font-weight: bold; font-size: 19px; }
        .unvan-3 { color: #cd7f32; font-weight: bold; font-size: 19px; }
        
        @keyframes parilti {
            from { text-shadow: 0 0 5px #ffd700; }
            to { text-shadow: 0 0 15px #fff, 0 0 25px #ffd700; }
        }
    </style>
</head>
<body>

    <div id="karsilama">
        <button id="giris-butonu">Satranç Kulübüne Giriş Yap</button>
    </div>

    <div id="icerik">
        <h1 style="color: #ffcc00; letter-spacing: 2px;">Ruby Satranç Takımı</h1>
        
        <div class="tablo-kapsayici">
            <h2 style="border-bottom: 2px solid #ffcc00; padding-bottom: 10px;">⚡ Blitz Sıralaması (İlk 10)</h2>
            <div id="blitz-top10">Veriler Lichess'ten çekiliyor...</div>
        </div>
        
        <div class="tablo-kapsayici">
            <h2 style="border-bottom: 1px solid #777; padding-bottom: 10px; color: #ccc;">📜 Genel Sıralama (İlk 100)</h2>
            <div id="blitz-top100" class="scroll-kapsayici">Yükleniyor...</div>
        </div>
        
<!-- YENİ EKLENEN: CANLI MAÇLAR BÖLÜMÜ -->
        <div class="tablo-kapsayici" style="margin-top: 40px; border: 2px dashed #ffcc00;">
            <h2 style="color: #ffcc00; margin-bottom: 15px;">🔴 Canlı Yayın (Oynanan Maçlar)</h2>
            <button id="canli-mac-butonu" style="padding: 10px 20px; background: #ffcc00; color: #1a1a1a; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; margin-bottom: 20px;">Şu An Oynayanları Bul</button>
            <div id="canli-mac-listesi" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 20px;">
                <!-- Canlı maç tahtaları tıklandığında buraya gelecek -->
                <p style="color: #bbb;">Sorgulamak için yukarıdaki butona tıklayın.</p>
            </div>
        </div>
        
        <div id="youtube-player" style="display:none;"></div>
    </div>

    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0', width: '0', videoId: 'kwZvy3qDpkQ', 
                playerVars: { 'autoplay': 0, 'controls': 0 }
            });
        }

        document.getElementById('giris-butonu').addEventListener('click', function() {
            player.playVideo();
            document.getElementById('karsilama').style.display = 'none';
            document.getElementById('icerik').style.display = 'block';
            
            veriCekVeSirala();
        });

        function veriCekVeSirala() {
            // AŞAMA 1: Sadece oyuncu ID'lerini topluyoruz
            fetch('https://lichess.org/api/team/ruby-satranc/users')
            .then(response => response.text())
            .then(text => {
                let idListesi = [];
                let satirlar = text.split('\n');
                
                for(let satir of satirlar) {
                    if(satir.trim() !== '') {
                        try { 
                            let veri = JSON.parse(satir);
                            if(veri.id) idListesi.push(veri.id); // Lichess saklasa bile ID'yi mecbur veriyor
                        } catch(err) {}
                    }
                }
                
                if(idListesi.length === 0) throw new Error("Takım verisi alınamadı.");
                
                // AŞAMA 2: ID'leri gönderip "Bize bu kişilerin tam isimlerini ve puanlarını ver" diyoruz.
                let sorgu = idListesi.slice(0, 300).join(',');
                return fetch('https://lichess.org/api/users', {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: sorgu
                });
            })
            .then(response => response.json())
            .then(tamOyuncular => {
                // Artık elimizde içinde eksiksiz puanların (perfs) ve gerçek isimlerin (username) olduğu dizi var.
                tamOyuncular.sort((a, b) => {
                    let puanA = (a.perfs && a.perfs.blitz && a.perfs.blitz.rating) ? a.perfs.blitz.rating : 0;
                    let puanB = (b.perfs && b.perfs.blitz && b.perfs.blitz.rating) ? b.perfs.blitz.rating : 0;
                    return puanB - puanA;
                });
                
                let top10HTML = '';
                let top100HTML = '';
                
                for(let i = 0; i < tamOyuncular.length; i++) {
                    let oyuncu = tamOyuncular[i];
                    let isim = oyuncu.username || oyuncu.id; // Gerçek ismi garantiledik
                    let puan = (oyuncu.perfs && oyuncu.perfs.blitz && oyuncu.perfs.blitz.rating) ? oyuncu.perfs.blitz.rating : 0;
                    
                    let unvan = '';
                    let cssSinifi = '';
                    
                    if(i === 0) { unvan = '👑 [KRAL] '; cssSinifi = 'unvan-1'; }
                    else if(i === 1) { unvan = '⚔️ [VEZİR] '; cssSinifi = 'unvan-2'; }
                    else if(i === 2) { unvan = '🏰 [KALE] '; cssSinifi = 'unvan-3'; }
                    
                    let satirKodu = `
                        <div class="oyuncu-satiri ${cssSinifi}">
                            <span>${i+1}. ${unvan}${isim}</span>
                            <span><strong>${puan}</strong> Puan</span>
                        </div>
                    `;
                    
                    if(i < 10) { top10HTML += satirKodu; }
                    if(i < 100) { top100HTML += satirKodu; }
                }
                
                document.getElementById('blitz-top10').innerHTML = top10HTML;
                document.getElementById('blitz-top100').innerHTML = top100HTML;
            })
            .catch(hata => {
                document.getElementById('blitz-top10').innerHTML = "Lichess Bağlantı Hatası: Lütfen sayfayı yenileyin.";
            });
        }
    // --- YENİ EKLENEN: CANLI MAÇ SİSTEMİ MOTORU ---
        // Mevcut kodları hiç etkilemez, kendi başına çalışır
        document.getElementById('canli-mac-butonu').addEventListener('click', function() {
            let listeDiv = document.getElementById('canli-mac-listesi');
            listeDiv.innerHTML = "<p style='color: #ffcc00;'>Takım üyeleri taranıyor... Lütfen bekleyin.</p>";
            
            // 1. Önce takımdaki kişilerin kimliklerini (ID) alıyoruz
            fetch('https://lichess.org/api/team/ruby-satranc/users')
            .then(res => res.text())
            .then(text => {
                let idListesi = [];
                let satirlar = text.split('\n');
                for(let satir of satirlar) {
                    if(satir.trim() !== '') {
                        try { idListesi.push(JSON.parse(satir).id); } catch(e) {}
                    }
                }
                
                // 2. Lichess'in "Anlık Durum" merkezine soruyoruz: "Bunlardan maç yapan var mı?"
                let ids = idListesi.slice(0, 300).join(',');
                return fetch('https://lichess.org/api/users/status?ids=' + ids);
            })
            .then(res => res.json())
            .then(durumlar => {
                // playingId'si olanlar, şu an aktif maç yapanlardır
                let aktifMaclar = durumlar.filter(kisi => kisi.playingId); 
                
                if(aktifMaclar.length === 0) {
                    listeDiv.innerHTML = "<p>Şu anda maç yapan takım üyesi bulunmuyor.</p>";
                    return;
                }
                
                // 3. Maç yapanlar için canlı satranç tahtalarını oluşturuyoruz
                let htmlCikti = '';
                for(let oyuncu of aktifMaclar) {
                    htmlCikti += `
                        <div style="background: #222; padding: 15px; border-radius: 8px; text-align: center; box-shadow: 0 4px 8px rgba(0,0,0,0.8);">
                            <h3 style="color: #fff; margin-bottom: 10px;">⚔️ ${oyuncu.name || oyuncu.id} Oynuyor</h3>
                            
                            <!-- Lichess Canlı Tahta Bağlantısı -->
                            <iframe src="https://lichess.org/embed/${oyuncu.playingId}?theme=auto&bg=auto" 
                                    width="400" height="444" frameborder="0"></iframe>
                                    
                            <br>
                            <a href="https://lichess.org/${oyuncu.playingId}" target="_blank" style="color: #ffcc00; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 15px; border: 1px solid #ffcc00; padding: 5px 10px; border-radius: 5px;">Büyük Ekranda İzle</a>
                        </div>
                    `;
                }
                listeDiv.innerHTML = htmlCikti;
            })
            .catch(hata => {
                listeDiv.innerHTML = "<p>Sorgulama sırasında bir hata oluştu.</p>";
            });
        });
    </script>
</body>
</html>

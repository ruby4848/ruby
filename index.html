<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lichess Satranç Kulübü</title>
    <style>
        body { 
            background-color: #1a1a1a; /* Koyu satranç teması */
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin-top: 15%; 
        }
        #giris-butonu { 
            padding: 20px 40px; 
            font-size: 24px; 
            background-color: #2c2c2c; 
            color: #ffcc00; 
            border: 2px solid #ffcc00; 
            border-radius: 10px; 
            cursor: pointer;
            transition: 0.3s;
        }
        #giris-butonu:hover { 
            background-color: #ffcc00; 
            color: #1a1a1a; 
        }
        #icerik { 
            display: none; /* İlk başta gizli */
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <!-- İlk Karşılama Ekranı -->
    <div id="karsilama">
        <h1>Lichess Takım Sayfamıza Hoş Geldiniz</h1>
        <button id="giris-butonu">Kulübe Giriş Yap</button>
    </div>

    <!-- Asıl Site İçeriği (Giriş yaptıktan sonra açılacak) -->
    <div id="icerik">
        <h2>Sistem Yükleniyor...</h2>
        <p>Müzik çalıyor ve oyuncu verileri Lichess sunucularından çekiliyor...</p>
        <!-- İleride listeleri ve tabloları buraya ekleyeceğiz -->
        
        <!-- Arka Plan Müzik Oynatıcısı (Gizli) -->
        <div id="youtube-player" style="display:none;"></div>
    </div>

    <!-- YouTube Ses Sistemi (JavaScript) -->
    <script>
        // YouTube API'sini otomatik olarak sisteme çekiyoruz
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            // Seçtiğin videonun (kwZvy3qDpkQ) ayarları
            player = new YT.Player('youtube-player', {
                height: '0',
                width: '0',
                videoId: 'kwZvy3qDpkQ', 
                playerVars: {
                    'autoplay': 0, // Tarayıcı engeline takılmamak için kapalı
                    'controls': 0
                }
            });
        }

        // Butona tıklandığında ne olacak?
        document.getElementById('giris-butonu').addEventListener('click', function() {
            // 1. Müziği başlat
            player.playVideo();
            // 2. Karşılama ekranını gizle
            document.getElementById('karsilama').style.display = 'none';
            // 3. Asıl site içeriğini göster
            document.getElementById('icerik').style.display = 'block';
        });
    </script>
</body>
</html>

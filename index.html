<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RUBY Satranç Kulübü</title>
    <!-- Daha zarif bir font ailesi -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        /* --- MİNİMALİST VE YAKUT TEMASI --- */
        body { 
            background-color: #0d0d0d; /* Daha derin bir siyah */
            color: #e0e0e0; 
            font-family: 'Inter', sans-serif; 
            text-align: center; 
            margin: 0;
            padding-bottom: 50px;
        }
        
        /* Acayip Havalı Neon Yakut Başlık Efekti */
        .neon-ruby {
            color: #ff3366;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 5px #ff3366, 0 0 10px #ff3366, 0 0 20px #e0115f, 0 0 40px #e0115f;
            animation: pulsate 1.5s infinite alternate;
        }
        
        @keyframes pulsate {
            0% { text-shadow: 0 0 2px #ff3366, 0 0 5px #ff3366; transform: scale(1); }
            100% { text-shadow: 0 0 10px #ff3366, 0 0 20px #ff3366, 0 0 30px #e0115f; transform: scale(1.02); }
        }

        #karsilama {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1a050d 0%, #0d0d0d 100%);
        }
        
        #giris-butonu { 
            padding: 15px 40px; 
            font-size: 20px; 
            font-weight: 600;
            background-color: transparent; 
            color: #ff3366; 
            border: 2px solid #ff3366; 
            border-radius: 30px; 
            cursor: pointer; 
            transition: all 0.4s ease; 
            margin-top: 40px;
            letter-spacing: 1px;
        }
        #giris-butonu:hover { 
            background-color: #ff3366; 
            color: #0d0d0d; 
            box-shadow: 0 0 20px #e0115f; 
        }
        
        #icerik { display: none; margin-top: 30px; padding: 0 20px; }
        
        /* --- BUZLU CAM (GLASSMORPHISM) MİNİMAL TABLOLAR --- */
        .tablo-kapsayici {
            background: rgba(30, 30, 30, 0.4);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(224, 17, 95, 0.15);
            border-radius: 15px;
            padding: 25px;
            margin: 25px auto;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: left;
        }
        
        .tablo-baslik {
            border-bottom: 1px solid rgba(255, 51, 102, 0.3);
            padding-bottom: 12px;
            margin-bottom: 15px;
            color: #ff3366;
            font-size: 20px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .scroll-kapsayici { max-height: 350px; overflow-y: auto; padding-right: 10px; }
        .scroll-kapsayici::-webkit-scrollbar { width: 5px; }
        .scroll-kapsayici::-webkit-scrollbar-track { background: transparent; }
        .scroll-kapsayici::-webkit-scrollbar-thumb { background: #ff3366; border-radius: 10px; }
        
        .oyuncu-satiri {
            display: flex; justify-content: space-between; padding: 12px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 16px;
            transition: background 0.2s;
        }
        .oyuncu-satiri:hover { background: rgba(255, 51, 102, 0.05); border-radius: 8px; }
        .oyuncu-satiri:last-child { border-bottom: none; }
        
        /* Unvanlar */
        .unvan-1 { color: #ff3366; font-weight: bold; font-size: 18px; text-shadow: 0 0 8px #ff3366; }
        .unvan-2 { color: #c0c0c0; font-weight: bold; font-size: 17px; }
        .unvan-3 { color: #cd7f32; font-weight: bold; font-size: 17px; }
        
        /* --- TURNUVA İSTATİSTİKLERİ ÖZEL TASARIM --- */
        .stat-kutulari { display: flex; gap: 15px; font-size: 14px; font-weight: 600; }
        .stat-g { color: #4CAF50; } /* Yeşil Galibiyet */
        .stat-b { color: #888; }    /* Gri Beraberlik */
        .stat-m { color: #F44336; } /* Kırmızı Mağlubiyet */
        .stat-oran { color: #ff3366; border: 1px solid #ff3366; padding: 2px 6px; border-radius: 5px; }

        /* --- TEPEDEKİ MİNİMAL CANLI BUTONU --- */
        #ust-canli-buton {
            background-color: rgba(224, 17, 95, 0.1); 
            color: #ff3366; 
            padding: 10px 25px; 
            font-size: 16px;
            border: 1px solid #ff3366; 
            border-radius: 20px; 
            cursor: pointer; 
            margin-bottom: 10px;
            font-weight: 600; 
            transition: 0.3s;
        }
        #ust-canli-buton:hover { background-color: #ff3366; color: #0d0d0d; box-shadow: 0 0 15px #e0115f; }

        /* --- MODAL (AÇILIR PENCERE) --- */
        .modal-arkaplan {
            display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(13, 13, 13, 0.9); backdrop-filter: blur(8px); overflow: auto;
        }
        .modal-icerik {
            background-color: #151515; margin: 5% auto; padding: 30px; 
            border: 1px solid rgba(224, 17, 95, 0.3);
            width: 90%; max-width: 900px; border-radius: 15px; position: relative;
            box-shadow: 0 0 30px rgba(224, 17, 95, 0.2);
        }
        .kapat-butonu {
            color: #ff3366; float: right; font-size: 30px; font-weight: 300; cursor: pointer; line-height: 1;
        }
        
        .mac-kutusu {
            background: #1a1a1a; padding: 15px; border-radius: 12px; text-align: center; 
            border: 1px solid #333; width: 100%; max-width: 380px;
        }
        
        /* YouTube Oynatıcıyı Gizlemek İçin Güvenli Sınıf */
        .youtube-gizli { position: absolute; top: -9999px; left: -9999px; width: 1px; height: 1px; }
    </style>
</head>
<body>

    <!-- YOUTUBE OYNATICI (Sistemi bozmaması için özel olarak gizlendi) -->
    <div id="youtube-player" class="youtube-gizli"></div>

    <div id="karsilama">
        <h1 class="neon-ruby" style="font-size: 4rem; margin: 0;">RUBY SATRANÇ</h1>
        <p style="color: #888; letter-spacing: 2px; margin-top: 10px;">ELİT BİR TOPLULUK</p>
        <button id="giris-butonu">KULÜBE GİRİŞ YAP</button>
    </div>

    <div id="icerik">
        <h1 class="neon-ruby" style="font-size: 2.5rem; margin-bottom: 20px;">RUBY SATRANÇ</h1>
        
        <button id="ust-canli-buton">🔴 Canlı Maçları İzle</button>
        
        <!-- YENİ: TURNUVA İSTATİSTİKLERİ BÖLÜMÜ -->
        <div class="tablo-kapsayici">
            <div class="tablo-baslik">
                <span>🏆 Kulüp Turnuva İstatistikleri</span>
                <span style="font-size: 12px; color: #888; font-weight: normal;">(Son 11 Turnuva)</span>
            </div>
            <div id="turnuva-listesi" class="scroll-kapsayici">Yükleniyor...</div>
        </div>

        <div class="tablo-kapsayici">
            <div class="tablo-baslik">⚡ Blitz Sıralaması (İlk 10)</div>
            <div id="blitz-top10">Veriler Lichess'ten çekiliyor...</div>
        </div>
        
        <div class="tablo-kapsayici">
            <div class="tablo-baslik">📜 Genel Sıralama (Tüm Takım)</div>
            <div id="blitz-top100" class="scroll-kapsayici">Yükleniyor...</div>
        </div>
    </div>

    <!-- CANLI MAÇ MODALI -->
    <div id="canli-modal" class="modal-arkaplan">
        <div class="modal-icerik">
            <span class="kapat-butonu" id="modal-kapat">&times;</span>
            <div class="tablo-baslik" style="border-bottom: 1px solid #ff3366; justify-content: center; margin-bottom: 30px;">
                🔴 SAHADAKİLER
            </div>
            
            <div id="modal-yukleniyor" style="color: #888; text-align: center; display: none;">Lichess taranıyor...</div>
            <div id="mac-yapanlar-alani" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; margin-bottom: 40px;"></div>
            <div id="sadece-online-alani" style="border-top: 1px dashed #333; padding-top: 20px; text-align: center;"></div>
        </div>
    </div>

    <script>
        // --- TURNUVA VERİLERİ (BURAYI İSTEDİĞİN ZAMAN GÜNCELLEYEBİLİRSİN) ---
        // Yeni birini eklemek için bir alt satıra kopyalaman yeterli. (g: Galibiyet, b: Beraberlik, m: Mağlubiyet)
        const turnuvaVerileri = [
            { isim: "Armageddon_Satranc", g: 33, b: 23, m: 13 },
            { isim: "EmanuelLasker61", g: 28, b: 15, m: 8 },
            { isim: "Shut_LeaderAPI", g: 25, b: 10, m: 12 },
            { isim: "Ricardoreti1979", g: 20, b: 8, m: 15 },
            { isim: "SerkanKayaa", g: 18, b: 5, m: 10 }
        ];

        // --- YOUTUBE MÜZİK MOTORU ---
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '200', width: '200', 
                videoId: '5qap5aO4i9A', // Rahatlatıcı Satranç Lofi Müziği
                playerVars: { 'autoplay': 0, 'controls': 0, 'loop': 1 }
            });
        }

        document.getElementById('giris-butonu').addEventListener('click', function() {
            try { if (player && typeof player.playVideo === 'function') { player.playVideo(); } } 
            catch (e) { console.log("Müzik başlatılamadı."); }
            
            document.getElementById('karsilama').style.display = 'none';
            document.getElementById('icerik').style.display = 'block';
            veriCekVeSirala();
            turnuvaTablosuOlustur();
        });

        // --- TURNUVA TABLOSU OLUŞTURUCU ---
        function turnuvaTablosuOlustur() {
            // Başarı oranına göre yüksekten düşüğe sırala
            turnuvaVerileri.sort((a, b) => {
                let oranA = a.g / (a.g + a.b + a.m);
                let oranB = b.g / (b.g + b.b + b.m);
                return oranB - oranA;
            });

            let html = '';
            for(let i = 0; i < turnuvaVerileri.length; i++) {
                let d = turnuvaVerileri[i];
                let toplamMac = d.g + d.b + d.m;
                let basariOrani = ((d.g / toplamMac) * 100).toFixed(1);
                
                html += `
                    <div class="oyuncu-satiri">
                        <span style="color: #e0e0e0; font-weight: 600;">${i+1}. ${d.isim}</span>
                        <div class="stat-kutulari">
                            <span class="stat-g" title="Galibiyet">${d.g}G</span>
                            <span class="stat-b" title="Beraberlik">${d.b}B</span>
                            <span class="stat-m" title="Mağlubiyet">${d.m}M</span>
                            <span class="stat-oran">%${basariOrani}</span>
                        </div>
                    </div>
                `;
            }
            document.getElementById('turnuva-listesi').innerHTML = html;
        }

        // --- LİCHESS LİSTE MOTORU ---
        function veriCekVeSirala() {
            fetch('https://lichess.org/api/team/ruby-satranc/users')
            .then(response => response.text())
            .then(text => {
                let idListesi = [];
                let satirlar = text.split('\n');
                for(let satir of satirlar) {
                    if(satir.trim() !== '') { try { idListesi.push(JSON.parse(satir).id); } catch(err) {} }
                }
                let sorgu = idListesi.slice(0, 300).join(',');
                return fetch('https://lichess.org/api/users', {
                    method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: sorgu
                });
            })
            .then(response => response.json())
            .then(tamOyuncular => {
                tamOyuncular.sort((a, b) => {
                    let puanA = (a.perfs && a.perfs.blitz && a.perfs.blitz.rating) ? a.perfs.blitz.rating : 0;
                    let puanB = (b.perfs && b.perfs.blitz && b.perfs.blitz.rating) ? b.perfs.blitz.rating : 0;
                    return puanB - puanA;
                });
                
                let top10HTML = '';
                let top100HTML = '';
                
                for(let i = 0; i < tamOyuncular.length; i++) {
                    let oyuncu = tamOyuncular[i];
                    let isim = oyuncu.username || oyuncu.id; 
                    let puan = (oyuncu.perfs && oyuncu.perfs.blitz && oyuncu.perfs.blitz.rating) ? oyuncu.perfs.blitz.rating : 0;
                    let unvan = ''; let cssSinifi = '';
                    
                    if(i === 0) { unvan = '👑 '; cssSinifi = 'unvan-1'; }
                    else if(i === 1) { unvan = '⚔️ '; cssSinifi = 'unvan-2'; }
                    else if(i === 2) { unvan = '🏰 '; cssSinifi = 'unvan-3'; }
                    
                    let satirKodu = `
                        <div class="oyuncu-satiri ${cssSinifi}">
                            <span>${i+1}. ${unvan}${isim}</span>
                            <span style="color:#ff3366;">${puan} Puan</span>
                        </div>
                    `;
                    if(i < 10) { top10HTML += satirKodu; }
                    if(i < 100) { top100HTML += satirKodu; }
                }
                document.getElementById('blitz-top10').innerHTML = top10HTML;
                document.getElementById('blitz-top100').innerHTML = top100HTML;
            }).catch(hata => {});
        }

        // --- CANLI MAÇ MOTORU VE ÖNBELLEK (CACHE) TEMİZLEYİCİ ---
        let modal = document.getElementById("canli-modal");
        let btn = document.getElementById("ust-canli-buton");
        let span = document.getElementById("modal-kapat");

        btn.onclick = function() {
            modal.style.display = "block";
            canliYayinlariGetir();
        }
        span.onclick = function() { modal.style.display = "none"; }
        window.onclick = function(event) { if (event.target == modal) { modal.style.display = "none"; } }

        function canliYayinlariGetir() {
            let macAlani = document.getElementById('mac-yapanlar-alani');
            let onlineAlani = document.getElementById('sadece-online-alani');
            let loading = document.getElementById('modal-yukleniyor');
            
            macAlani.innerHTML = '';
            onlineAlani.innerHTML = '';
            loading.style.display = 'block';
            
            fetch('https://lichess.org/api/team/ruby-satranc/users')
            .then(res => res.text())
            .then(text => {
                let idListesi = [];
                let satirlar = text.split('\n');
                for(let satir of satirlar) {
                    if(satir.trim() !== '') { try { idListesi.push(JSON.parse(satir).id); } catch(e) {} }
                }
                
                let istekler = [];
                for (let i = 0; i < idListesi.length; i += 100) {
                    let ids = idListesi.slice(i, i + 100).join(',');
                    istekler.push(fetch('https://lichess.org/api/users/status?ids=' + ids + '&withGameIds=true').then(r => r.json()));
                }
                return Promise.all(istekler);
            })
            .then(sonuclar => {
                loading.style.display = 'none';
                let durumlar = sonuclar.flat();
                
                let aktifMaclar = durumlar.filter(kisi => kisi.playingId); 
                let onlineKisiler = durumlar.filter(kisi => kisi.online && !kisi.playingId);
                
                if(aktifMaclar.length === 0) {
                    macAlani.innerHTML = "<p style='color: #666;'>Sahada kimse yok.</p>";
                } else {
                    let macHTML = '';
                    // Cache'i engellemek için url sonuna rastgele bir zaman damgası ekliyoruz
                    let zamanDamgasi = new Date().getTime(); 
                    
                    for(let oyuncu of aktifMaclar) {
                        let isim = oyuncu.name || oyuncu.id;
                        macHTML += `
                            <div class="mac-kutusu">
                                <div style="margin-bottom: 15px;">
                                    <span style="color:#ff3366; font-weight:800; font-size:20px; letter-spacing:1px; text-shadow: 0 0 10px #ff3366;">[RUBY] ${isim}</span> 
                                </div>
                                <iframe src="https://lichess.org/embed/${oyuncu.playingId}?theme=dark&bg=dark&v=${zamanDamgasi}" width="100%" height="370" frameborder="0"></iframe>
                                <a href="https://lichess.org/${oyuncu.playingId}" target="_blank" style="color: #0d0d0d; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 15px; background: #ff3366; padding: 10px 20px; border-radius: 20px; transition: 0.3s;">Dev Ekranda İzle</a>
                            </div>
                        `;
                    }
                    macAlani.innerHTML = macHTML;
                }
                
                if (onlineKisiler.length > 0) {
                    let isimlerHTML = onlineKisiler.map(kisi => `<span style="background: rgba(76, 175, 80, 0.1); padding: 6px 12px; border-radius: 20px; margin: 5px; display: inline-block; border: 1px solid rgba(76, 175, 80, 0.4); color: #4CAF50; font-size: 14px;">🟢 ${kisi.name}</span>`).join('');
                    onlineAlani.innerHTML = `
                        <h4 style="color: #888; font-weight: normal; margin-bottom: 15px;">Lobide Bekleyenler</h4>
                        <div>${isimlerHTML}</div>
                    `;
                } else {
                    onlineAlani.innerHTML = `<p style="color: #444;">Lobide bekleyen oyuncu yok.</p>`;
                }
            })
            .catch(hata => {
                loading.style.display = 'none';
                macAlani.innerHTML = "<p style='color: #ff3366;'>Bağlantı koptu.</p>";
            });
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lichess Satranç Kulübü</title>
    <style>
        /* --- TEMEL TASARIM --- */
        body { 
            background-color: #1a1a1a; 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin-top: 3%; 
            padding-bottom: 50px;
        }
        
        #giris-butonu { 
            padding: 20px 40px; font-size: 24px; background-color: #2c2c2c; 
            color: #ffcc00; border: 2px solid #ffcc00; border-radius: 10px; 
            cursor: pointer; transition: 0.3s; margin-top: 15%;
        }
        #giris-butonu:hover { background-color: #ffcc00; color: #1a1a1a; box-shadow: 0 0 15px #ffcc00; }
        
        #icerik { display: none; margin-top: 20px; }
        
        /* --- TABLOLAR --- */
        .tablo-kapsayici {
            background-color: #2c2c2c; border-radius: 10px; padding: 20px;
            margin: 20px auto; width: 90%; max-width: 650px; box-shadow: 0 6px 12px rgba(0,0,0,0.6);
        }
        .scroll-kapsayici { max-height: 400px; overflow-y: auto; padding-right: 10px; }
        .scroll-kapsayici::-webkit-scrollbar { width: 8px; }
        .scroll-kapsayici::-webkit-scrollbar-track { background: #1a1a1a; border-radius: 4px; }
        .scroll-kapsayici::-webkit-scrollbar-thumb { background: #ffcc00; border-radius: 4px; }
        
        .oyuncu-satiri {
            display: flex; justify-content: space-between; padding: 12px 5px;
            border-bottom: 1px solid #444; font-size: 18px;
        }
        .oyuncu-satiri:last-child { border-bottom: none; }
        
        .unvan-1 { color: #ffd700; font-weight: bold; animation: parilti 1.5s infinite alternate; font-size: 20px; }
        .unvan-2 { color: #c0c0c0; font-weight: bold; font-size: 19px; }
        .unvan-3 { color: #cd7f32; font-weight: bold; font-size: 19px; }
        
        @keyframes parilti {
            from { text-shadow: 0 0 5px #ffd700; }
            to { text-shadow: 0 0 15px #fff, 0 0 25px #ffd700; }
        }

        /* --- YENİ EKLENEN: AÇILIR PENCERE (MODAL) VE YAKUT EFEKTİ --- */
        #ust-canli-buton {
            background-color: #aa0000; color: white; padding: 12px 25px; font-size: 18px;
            border: 2px solid #ff4d4d; border-radius: 8px; cursor: pointer; margin-bottom: 20px;
            font-weight: bold; animation: nabiz 2s infinite; display: inline-block;
        }
        #ust-canli-buton:hover { background-color: #ff0000; box-shadow: 0 0 15px #ff4d4d; }
        
        @keyframes nabiz {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .modal-arkaplan {
            display: none; position: fixed; z-index: 999; left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.85); backdrop-filter: blur(5px); overflow: auto;
        }
        .modal-icerik {
            background-color: #1a1a1a; margin: 5% auto; padding: 20px; border: 2px solid #ffcc00;
            width: 90%; max-width: 900px; border-radius: 10px; position: relative;
        }
        .kapat-butonu {
            color: #ffcc00; float: right; font-size: 35px; font-weight: bold; cursor: pointer; line-height: 1;
        }
        .kapat-butonu:hover { color: #fff; }

        .yakut-isim {
            color: #e0115f; /* Yakut Kırmızısı */
            font-weight: bold;
            font-size: 22px;
            animation: yakutParlamasi 0.8s infinite alternate;
        }
        @keyframes yakutParlamasi {
            from { text-shadow: 0 0 5px #e0115f, 0 0 10px #e0115f; }
            to { text-shadow: 0 0 15px #ff4d4d, 0 0 25px #ff4d4d; color: #ff4d4d; }
        }
        
        /* Çevrimiçi/Maç Kutu Ayırıcıları */
        .mac-kutusu {
            background: #222; padding: 15px; border-radius: 8px; text-align: center; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.8); border: 1px solid #444; width: 100%; max-width: 350px;
        }
    </style>
</head>
<body>

    <div id="karsilama">
        <button id="giris-butonu">Satranç Kulübüne Giriş Yap</button>
    </div>

    <div id="icerik">
        <h1 style="color: #ffcc00; letter-spacing: 2px;">Ruby Satranç Takımı</h1>
        
        <!-- YENİ EKLENEN: TEPEDEKİ CANLI YAYIN BUTONU -->
        <button id="ust-canli-buton">🔴 Canlı Yayınları İzle</button>
        
        <div class="tablo-kapsayici">
            <h2 style="border-bottom: 2px solid #ffcc00; padding-bottom: 10px;">⚡ Blitz Sıralaması (İlk 10)</h2>
            <div id="blitz-top10">Veriler Lichess'ten çekiliyor...</div>
        </div>
        
        <div class="tablo-kapsayici">
            <h2 style="border-bottom: 1px solid #777; padding-bottom: 10px; color: #ccc;">📜 Genel Sıralama (İlk 100)</h2>
            <div id="blitz-top100" class="scroll-kapsayici">Yükleniyor...</div>
        </div>
        
        <div id="youtube-player" style="display:none;"></div>
    </div>

    <!-- YENİ EKLENEN: AÇILIR PENCERE (MODAL) İSKELETİ -->
    <div id="canli-modal" class="modal-arkaplan">
        <div class="modal-icerik">
            <span class="kapat-butonu" id="modal-kapat">&times;</span>
            <h2 style="color: #ffcc00; margin-bottom: 20px; border-bottom: 1px dashed #ffcc00; padding-bottom: 10px;">🔴 Takımın Canlı Durumu</h2>
            
            <div id="modal-yukleniyor" style="color: #bbb; display: none;">Saha taranıyor...</div>
            
            <!-- MAÇ YAPANLAR AYRI ALAN -->
            <div id="mac-yapanlar-alani" style="display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-bottom: 30px;"></div>
            
            <!-- SADECE ONLİNE OLANLAR AYRI ALAN -->
            <div id="sadece-online-alani" style="border-top: 1px solid #444; padding-top: 20px; text-align: center;"></div>
        </div>
    </div>

    <script>
        // --- YOUTUBE MÜZİK (ID'yi değiştirdim, sakin lofi satranç müziği) ---
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0', width: '0', videoId: 'zw1_S10BjSs', // <-- MÜZİK ID'Sİ BURADA
                playerVars: { 'autoplay': 0, 'controls': 0 }
            });
        }

        document.getElementById('giris-butonu').addEventListener('click', function() {
            try { if (player && typeof player.playVideo === 'function') { player.playVideo(); } } 
            catch (e) { console.log("Müzik başlatılamadı."); }
            
            document.getElementById('karsilama').style.display = 'none';
            document.getElementById('icerik').style.display = 'block';
            veriCekVeSirala();
        });

        // --- LİSTE ÇEKME MOTORU (Korundu) ---
        function veriCekVeSirala() {
            fetch('https://lichess.org/api/team/ruby-satranc/users')
            .then(response => response.text())
            .then(text => {
                let idListesi = [];
                let satirlar = text.split('\n');
                for(let satir of satirlar) {
                    if(satir.trim() !== '') { try { idListesi.push(JSON.parse(satir).id); } catch(err) {} }
                }
                let sorgu = idListesi.slice(0, 300).join(',');
                return fetch('https://lichess.org/api/users', {
                    method: 'POST', headers: { 'Content-Type': 'text/plain' }, body: sorgu
                });
            })
            .then(response => response.json())
            .then(tamOyuncular => {
                tamOyuncular.sort((a, b) => {
                    let puanA = (a.perfs && a.perfs.blitz && a.perfs.blitz.rating) ? a.perfs.blitz.rating : 0;
                    let puanB = (b.perfs && b.perfs.blitz && b.perfs.blitz.rating) ? b.perfs.blitz.rating : 0;
                    return puanB - puanA;
                });
                
                let top10HTML = '';
                let top100HTML = '';
                
                for(let i = 0; i < tamOyuncular.length; i++) {
                    let oyuncu = tamOyuncular[i];
                    let isim = oyuncu.username || oyuncu.id; 
                    let puan = (oyuncu.perfs && oyuncu.perfs.blitz && oyuncu.perfs.blitz.rating) ? oyuncu.perfs.blitz.rating : 0;
                    let unvan = ''; let cssSinifi = '';
                    
                    if(i === 0) { unvan = '👑 [KRAL] '; cssSinifi = 'unvan-1'; }
                    else if(i === 1) { unvan = '⚔️ [VEZİR] '; cssSinifi = 'unvan-2'; }
                    else if(i === 2) { unvan = '🏰 [KALE] '; cssSinifi = 'unvan-3'; }
                    
                    let satirKodu = `
                        <div class="oyuncu-satiri ${cssSinifi}">
                            <span>${i+1}. ${unvan}${isim}</span>
                            <span><strong>${puan}</strong> Puan</span>
                        </div>
                    `;
                    if(i < 10) { top10HTML += satirKodu; }
                    if(i < 100) { top100HTML += satirKodu; }
                }
                document.getElementById('blitz-top10').innerHTML = top10HTML;
                document.getElementById('blitz-top100').innerHTML = top100HTML;
            }).catch(hata => {});
        }

        // --- YENİ EKLENEN: AÇILIR PENCERE (MODAL) VE CANLI MAÇ MOTORU ---
        let modal = document.getElementById("canli-modal");
        let btn = document.getElementById("ust-canli-buton");
        let span = document.getElementById("modal-kapat");

        btn.onclick = function() {
            modal.style.display = "block";
            canliYayinlariGetir(); // Modal açılınca verileri çek
        }
        span.onclick = function() { modal.style.display = "none"; }
        window.onclick = function(event) { if (event.target == modal) { modal.style.display = "none"; } }

        function canliYayinlariGetir() {
            let macAlani = document.getElementById('mac-yapanlar-alani');
            let onlineAlani = document.getElementById('sadece-online-alani');
            let loading = document.getElementById('modal-yukleniyor');
            
            macAlani.innerHTML = '';
            onlineAlani.innerHTML = '';
            loading.style.display = 'block';
            
            fetch('https://lichess.org/api/team/ruby-satranc/users')
            .then(res => res.text())
            .then(text => {
                let idListesi = [];
                let satirlar = text.split('\n');
                for(let satir of satirlar) {
                    if(satir.trim() !== '') { try { idListesi.push(JSON.parse(satir).id); } catch(e) {} }
                }
                
                let istekler = [];
                for (let i = 0; i < idListesi.length; i += 100) {
                    let ids = idListesi.slice(i, i + 100).join(',');
                    istekler.push(fetch('https://lichess.org/api/users/status?ids=' + ids).then(r => r.json()));
                }
                return Promise.all(istekler);
            })
            .then(sonuclar => {
                loading.style.display = 'none';
                let durumlar = sonuclar.flat();
                
                let aktifMaclar = durumlar.filter(kisi => kisi.playingId); 
                let onlineKisiler = durumlar.filter(kisi => kisi.online && !kisi.playingId);
                
                // 1. MAÇ YAPANLAR ALANI (Yakut Kırmızısı ve [RUBY] Etiketi)
                if(aktifMaclar.length === 0) {
                    macAlani.innerHTML = "<p style='color: #aaa;'>Şu anda maç yapan takım üyesi yok.</p>";
                } else {
                    let macHTML = '';
                    for(let oyuncu of aktifMaclar) {
                        let isim = oyuncu.name || oyuncu.id;
                        macHTML += `
                            <div class="mac-kutusu">
                                <div style="margin-bottom: 10px;">
                                    <span class="yakut-isim">[RUBY] ${isim}</span> 
                                    <span style="color: #fff; font-size: 16px;">⚔️ Savașıyor</span>
                                </div>
                                <iframe src="https://lichess.org/embed/${oyuncu.playingId}?theme=auto&bg=auto" width="100%" height="350" frameborder="0"></iframe>
                                <a href="https://lichess.org/${oyuncu.playingId}" target="_blank" style="color: #1a1a1a; text-decoration: none; font-weight: bold; display: inline-block; margin-top: 15px; background: #ffcc00; padding: 8px 15px; border-radius: 5px;">Maçı Dev Ekranda İzle</a>
                            </div>
                        `;
                    }
                    macAlani.innerHTML = macHTML;
                }
                
                // 2. SADECE ÇEVRİMİÇİ OLANLAR ALANI
                if (onlineKisiler.length > 0) {
                    let isimlerHTML = onlineKisiler.map(kisi => `<span style="background: #333; padding: 5px 10px; border-radius: 15px; margin: 5px; display: inline-block; border: 1px solid #4CAF50;">🟢 ${kisi.name}</span>`).join('');
                    onlineAlani.innerHTML = `
                        <h4 style="color: #4CAF50; margin-bottom: 15px;">Şu An Lobide Olanlar (Oynamıyorlar)</h4>
                        <div style="color: #fff;">${isimlerHTML}</div>
                    `;
                } else {
                    onlineAlani.innerHTML = `<p style="color: #666;">Lobide bekleyen oyuncu yok.</p>`;
                }
            })
            .catch(hata => {
                loading.style.display = 'none';
                macAlani.innerHTML = "<p style='color: red;'>Lichess'e bağlanılamadı.</p>";
            });
        }
    </script>
</body>
</html>

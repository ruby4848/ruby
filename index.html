<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lichess Satranç Kulübü</title>
    <style>
        body { 
            background-color: #1a1a1a; 
            color: #ffffff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin-top: 3%; 
            padding-bottom: 50px;
        }
        
        #giris-butonu { 
            padding: 20px 40px; 
            font-size: 24px; 
            background-color: #2c2c2c; 
            color: #ffcc00; 
            border: 2px solid #ffcc00; 
            border-radius: 10px; 
            cursor: pointer;
            transition: 0.3s;
            margin-top: 15%;
        }
        #giris-butonu:hover { 
            background-color: #ffcc00; 
            color: #1a1a1a; 
            box-shadow: 0 0 15px #ffcc00;
        }
        
        #icerik { display: none; margin-top: 20px; }
        
        .tablo-kapsayici {
            background-color: #2c2c2c;
            border-radius: 10px;
            padding: 20px;
            margin: 20px auto;
            width: 90%;
            max-width: 650px;
            box-shadow: 0 6px 12px rgba(0,0,0,0.6);
        }
        
        .scroll-kapsayici {
            max-height: 500px; 
            overflow-y: auto;  
            padding-right: 10px;
        }
        
        .scroll-kapsayici::-webkit-scrollbar { width: 8px; }
        .scroll-kapsayici::-webkit-scrollbar-track { background: #1a1a1a; border-radius: 4px; }
        .scroll-kapsayici::-webkit-scrollbar-thumb { background: #ffcc00; border-radius: 4px; }
        
        .oyuncu-satiri {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 15px 10px;
            border-bottom: 1px solid #444;
        }
        .oyuncu-satiri:last-child { border-bottom: none; }
        
        .oyuncu-baslik {
            font-size: 20px;
            margin-bottom: 8px;
        }
        
        .istatistik-kutusu {
            width: 100%;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #bbb;
            background-color: #222;
            padding: 8px;
            border-radius: 5px;
        }
        
        .istatistik-kutusu b { color: #ffcc00; }
        
        .unvan-1 { color: #ffd700; font-weight: bold; animation: parilti 1.5s infinite alternate; }
        .unvan-2 { color: #c0c0c0; font-weight: bold; }
        .unvan-3 { color: #cd7f32; font-weight: bold; }
        
        @keyframes parilti {
            from { text-shadow: 0 0 5px #ffd700; }
            to { text-shadow: 0 0 15px #fff, 0 0 25px #ffd700; }
        }
    </style>
</head>
<body>

    <div id="karsilama">
        <button id="giris-butonu">Satranç Kulübüne Giriş Yap</button>
    </div>

    <div id="icerik">
        <h1 style="color: #ffcc00; letter-spacing: 2px;">RUBY SATRANÇ TAKIMI</h1>
        
        <div class="tablo-kapsayici">
            <h2 style="border-bottom: 2px solid #ffcc00; padding-bottom: 10px;">🏆 Kulüp Şampiyonları (İlk 10)</h2>
            <div id="blitz-top10">Veriler Lichess'ten çekiliyor...</div>
        </div>
        
        <div class="tablo-kapsayici">
            <h2 style="border-bottom: 1px solid #777; padding-bottom: 10px; color: #ccc;">📜 Genel Sıralama (Tüm Takım)</h2>
            <div id="blitz-top100" class="scroll-kapsayici">Yükleniyor...</div>
        </div>
        
        <div id="youtube-player" style="display:none;"></div>
    </div>

    <script>
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('youtube-player', {
                height: '0', width: '0', videoId: 'kwZvy3qDpkQ', 
                playerVars: { 'autoplay': 0, 'controls': 0 }
            });
        }

        document.getElementById('giris-butonu').addEventListener('click', function() {
            player.playVideo();
            document.getElementById('karsilama').style.display = 'none';
            document.getElementById('icerik').style.display = 'block';
            
            veriCekVeSirala();
        });

        // Verileri garantili çeken fonksiyonlar
        function statCek(oyuncu, kategori) {
            try { 
                let puan = oyuncu.perfs[kategori].rating;
                return puan ? puan : 0;
            } 
            catch(e) { return 0; }
        }

        function macCek(oyuncu) {
            try { return oyuncu.count.all || 0; } 
            catch(e) { return 0; }
        }

        function veriCekVeSirala() {
            // 1. ADIM: Sadece İsimleri Çekiyoruz
            fetch('https://lichess.org/api/team/ruby-satranc/users', {
                headers: { 'Accept': 'application/x-ndjson' }
            })
            .then(response => {
                if(!response.ok) throw new Error("Takım verisi alınamadı.");
                return response.text();
            })
            .then(text => {
                let isimler = [];
                let satirlar = text.trim().split('\n').filter(s => s.trim() !== '');
                for(let satir of satirlar) {
                    try { 
                        let veri = JSON.parse(satir);
                        if(veri.username) isimler.push(veri.username);
                    } catch(err) {}
                }
                
                if(isimler.length === 0) throw new Error("Takımda oyuncu bulunamadı.");
                
                // 2. ADIM: İsim listesini Lichess'e geri gönderip "Bize tam profilleri (perfs) ver" diyoruz.
                let sorguIsimleri = isimler.slice(0, 300).join(',');
                
                return fetch('https://lichess.org/api/users', {
                    method: 'POST',
                    headers: { 
                        'Accept': 'application/json', 
                        'Content-Type': 'text/plain' 
                    },
                    body: sorguIsimleri
                });
            })
            .then(response => response.json())
            .then(oyuncular => {
                // Oyuncuları en iyi puanına göre yüksekten düşüğe sırala
                oyuncular.sort((a, b) => {
                    let maxA = Math.max(statCek(a, 'blitz'), statCek(a, 'rapid'), statCek(a, 'bullet'));
                    let maxB = Math.max(statCek(b, 'blitz'), statCek(b, 'rapid'), statCek(b, 'bullet'));
                    return maxB - maxA; 
                });
                
                let top10HTML = '';
                let top100HTML = '';
                
                for(let i = 0; i < oyuncular.length; i++) {
                    let oyuncu = oyuncular[i];
                    let isim = oyuncu.username;
                    
                    let blitz = statCek(oyuncu, 'blitz');
                    let rapid = statCek(oyuncu, 'rapid');
                    let bullet = statCek(oyuncu, 'bullet');
                    let mac = macCek(oyuncu);
                    
                    let unvan = '';
                    let cssSinifi = '';
                    
                    if(i === 0) { unvan = '👑 [KRAL] '; cssSinifi = 'unvan-1'; }
                    else if(i === 1) { unvan = '⚔️ [VEZİR] '; cssSinifi = 'unvan-2'; }
                    else if(i === 2) { unvan = '🏰 [KALE] '; cssSinifi = 'unvan-3'; }
                    
                    let satirKodu = `
                        <div class="oyuncu-satiri ${cssSinifi}">
                            <div class="oyuncu-baslik">${i+1}. ${unvan}${isim}</div>
                            <div class="istatistik-kutusu">
                                <span>⚡ Blitz: <b>${blitz}</b></span>
                                <span>⏱️ Rapid: <b>${rapid}</b></span>
                                <span>🚀 Bullet: <b>${bullet}</b></span>
                                <span>🎮 Toplam Maç: <b>${mac}</b></span>
                            </div>
                        </div>
                    `;
                    
                    if(i < 10) { top10HTML += satirKodu; }
                    top100HTML += satirKodu; 
                }
                
                document.getElementById('blitz-top10').innerHTML = top10HTML;
                document.getElementById('blitz-top100').innerHTML = top100HTML;
            })
            .catch(hata => {
                document.getElementById('blitz-top10').innerHTML = "Lichess verileri çekilemedi: " + hata.message;
                document.getElementById('blitz-top100').innerHTML = "Lichess verileri çekilemedi: " + hata.message;
            });
        }
    </script>
</body>
</html>
